name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: fmt + clippy + test + engine-purity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # System deps for the GTK app crate. The engine crate needs none.
      - name: Install GTK4 / libadwaita / blueprint
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-4-dev libadwaita-1-dev blueprint-compiler

      - name: Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt --component clippy
          rustup default stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --all

      # PLAN §1 house rule 2 + §0 task 6: the engine crate must stay UI-free.
      - name: Engine purity
        run: |
          if cargo tree -p vitrine-engine -e normal \
              | grep -Ei '\b(gtk4|glib|gio|libadwaita|adw|ashpd)\b'; then
            echo "::error::vitrine-engine has a forbidden UI dependency"
            exit 1
          fi
          echo "engine is UI-free"
